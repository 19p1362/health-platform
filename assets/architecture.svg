<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="80" fill="url(#header)" opacity="0.9"/>
  <text x="600" y="40" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="28" font-weight="bold">HealthBridge Platform</text>
  <text x="600" y="62" text-anchor="middle" fill="#ccfbf1" font-family="system-ui" font-size="13">From Paper Records to AI-Powered Patient Care</text>

  <!-- Badges row -->
  <rect x="240" y="92" width="90" height="22" rx="4" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1"/>
  <text x="285" y="107" text-anchor="middle" fill="#22d3ee" font-family="system-ui" font-size="11">FHIR R4</text>

  <rect x="340" y="92" width="120" height="22" rx="4" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1"/>
  <text x="400" y="107" text-anchor="middle" fill="#34d399" font-family="system-ui" font-size="11">DPDP 2025</text>

  <rect x="470" y="92" width="100" height="22" rx="4" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1"/>
  <text x="520" y="107" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="11">ABDM Ready</text>

  <rect x="580" y="92" width="110" height="22" rx="4" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1"/>
  <text x="635" y="107" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="11">Multi-Tenant</text>

  <rect x="700" y="92" width="120" height="22" rx="4" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1"/>
  <text x="760" y="107" text-anchor="middle" fill="#fb923c" font-family="system-ui" font-size="11">10 AI Agents</text>

  <rect x="830" y="92" width="130" height="22" rx="4" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="1"/>
  <text x="895" y="107" text-anchor="middle" fill="#f472b6" font-family="system-ui" font-size="11">E2EE WhatsApp</text>

  <!-- Section: Patients / Input -->
  <rect x="50" y="140" width="200" height="80" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="150" y="170" text-anchor="middle" fill="#22d3ee" font-family="system-ui" font-size="13" font-weight="bold">📋 Patient Visits</text>
  <text x="150" y="190" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Paper prescriptions · Lab reports</text>
  <text x="150" y="206" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Discharge summaries · Pharmacy</text>

  <!-- Arrow: Patient → WhatsApp -->
  <line x1="250" y1="180" x2="340" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <!-- WhatsApp -->
  <rect x="350" y="140" width="200" height="80" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="450" y="170" text-anchor="middle" fill="#22d3ee" font-family="system-ui" font-size="13" font-weight="bold">💬 WhatsApp Business</text>
  <text x="450" y="190" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">E2EE photo/document relay</text>
  <text x="450" y="206" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Staff downloads + uploads</text>

  <!-- Arrow: WhatsApp → Ingestion -->
  <line x1="550" y1="180" x2="640" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="(#arrow)"/>

  <!-- Ingestion API -->
  <rect x="650" y="140" width="220" height="80" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="760" y="165" text-anchor="middle" fill="#34d399" font-family="system-ui" font-size="13" font-weight="bold">📄 Document Ingestion</text>
  <text x="760" y="185" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">OCR (Tesseract EN+HIN)</text>
  <text x="760" y="201" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">AI Extraction → FHIR R4</text>

  <!-- Arrow: Ingestion → Main API -->
  <line x1="870" y1="180" x2="930" y2="180" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Main API Box -->
  <rect x="940" y="130" width="220" height="100" rx="10" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="2"/>
  <text x="1050" y="160" text-anchor="middle" fill="#34d399" font-family="system-ui" font-size="14" font-weight="bold">⚡ FastAPI Backend</text>
  <text x="1050" y="180" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">FHIR API · Auth · Consent</text>
  <text x="1050" y="196" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Compliance · WhatsApp Bridge</text>
  <text x="1050" y="212" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">Port 8080 · 60+ Routes</text>

  <!-- Arrow: API → DB -->
  <line x1="1050" y1="230" x2="1050" y2="280" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Database -->
  <rect x="880" y="290" width="340" height="90" rx="10" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="1050" y="318" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="14" font-weight="bold">🗄️ Database</text>
  <text x="1050" y="340" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">SQLite (dev) · PostgreSQL (prod)</text>
  <text x="1050" y="356" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Redis cache · FHIR R4 resources</text>

  <!-- Arrow: DB → Agents -->
  <line x1="880" y1="335" x2="740" y2="335" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- Orchestrator Box -->
  <rect x="50" y="280" width="680" height="160" rx="12" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="390" y="305" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="12" font-weight="bold">🧠 10 AI Care Agents (Orchestrator)</text>

  <!-- Agent grid -->
  <rect x="70" y="318" width="125" height="38" rx="6" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="132" y="335" text-anchor="middle" fill="#c4b5fd" font-family="system-ui" font-size="9">🥼 Patient Intake</text>
  <text x="132" y="348" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Every 60 min</text>

  <rect x="205" y="318" width="125" height="38" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="0.8"/>
  <text x="267" y="335" text-anchor="middle" fill="#fdba74" font-family="system-ui" font-size="9">💊 Med Adherence</text>
  <text x="267" y="348" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Every 15 min</text>

  <rect x="340" y="318" width="125" height="38" rx="6" fill="rgba(244,114,182,0.3)" stroke="#f472b6" stroke-width="0.8"/>
  <text x="402" y="335" text-anchor="middle" fill="#f9a8d4" font-family="system-ui" font-size="9">📅 Follow-Up</text>
  <text x="402" y="348" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Every 30 min</text>

  <rect x="475" y="318" width="125" height="38" rx="6" fill="rgba(52,211,153,0.3)" stroke="#34d399" stroke-width="0.8"/>
  <text x="537" y="335" text-anchor="middle" fill="#6ee7b7" font-family="system-ui" font-size="9">📊 Risk Scoring</text>
  <text x="537" y="348" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Every 60 min</text>

  <rect x="610" y="318" width="100" height="38" rx="6" fill="rgba(96,165,250,0.3)" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="660" y="335" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="9">👨‍👩‍👧‍👦 Family</text>
  <text x="660" y="348" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">7 days</text>

  <rect x="70" y="365" width="125" height="38" rx="6" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="132" y="382" text-anchor="middle" fill="#fde68a" font-family="system-ui" font-size="9">📞 Voice Care</text>
  <text x="132" y="395" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Every 60 min</text>

  <rect x="205" y="365" width="125" height="38" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="0.8"/>
  <text x="267" y="382" text-anchor="middle" fill="#fdba74" font-family="system-ui" font-size="9">💊 Pharmacy</text>
  <text x="267" y="395" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Every 60 min</text>

  <rect x="340" y="365" width="125" height="38" rx="6" fill="rgba(244,114,182,0.3)" stroke="#f472b6" stroke-width="0.8"/>
  <text x="402" y="382" text-anchor="middle" fill="#f9a8d4" font-family="system-ui" font-size="9">🔬 Lab Alerts</text>
  <text x="402" y="395" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Every 30 min</text>

  <rect x="475" y="365" width="125" height="38" rx="6" fill="rgba(96,165,250,0.3)" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="537" y="382" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="9">📄 Insurance</text>
  <text x="537" y="395" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Every 24 h</text>

  <rect x="610" y="365" width="100" height="38" rx="6" fill="rgba(52,211,153,0.3)" stroke="#34d399" stroke-width="0.8"/>
  <text x="660" y="382" text-anchor="middle" fill="#6ee7b7" font-family="system-ui" font-size="9">🗓️ Appt.</text>
  <text x="660" y="395" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Every 30 min</text>

  <!-- Tenant Layer -->
  <rect x="50" y="460" width="1100" height="70" rx="12" fill="rgba(251,191,36,0.08)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="600" y="485" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="13" font-weight="bold">🔒 Multi-Tenant SaaS Layer</text>
  <text x="600" y="505" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Organization model · Tenant-scoped JWT · Role-based access (SUPER_ADMIN, ORG_ADMIN, DOCTOR, NURSE, COORDINATOR, READ_ONLY)</text>
  <text x="600" y="520" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">Subscription Tiers: Free · Starter · Professional · Enterprise</text>

  <!-- Frontend -->
  <rect x="50" y="555" width="250" height="90" rx="10" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="175" y="585" text-anchor="middle" fill="#22d3ee" font-family="system-ui" font-size="14" font-weight="bold">🖥️ React Frontend</text>
  <text x="175" y="605" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Vite + TypeScript · Port 3001</text>
  <text x="175" y="625" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">13 pages · Auth · Proxied API</text>

  <!-- Arrow: Frontend → API -->
  <line x1="300" y1="600" x2="360" y2="600" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Frontend Pages -->
  <rect x="370" y="550" width="350" height="100" rx="8" fill="rgba(8,51,68,0.2)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="545" y="572" text-anchor="middle" fill="#22d3ee" font-family="system-ui" font-size="11" font-weight="bold">Frontend Pages</text>
  <text x="390" y="592" fill="#94a3b8" font-family="system-ui" font-size="9">Landing · Login · Signup · Dashboard · Patients</text>
  <text x="390" y="610" fill="#94a3b8" font-family="system-ui" font-size="9">FHIR Explorer · Conversion · Consent · Compliance</text>
  <text x="390" y="628" fill="#94a3b8" font-family="system-ui" font-size="9">Audit · Upload · Settings · Document Upload</text>

  <!-- Compliance Box -->
  <rect x="760" y="555" width="390" height="100" rx="10" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="955" y="580" text-anchor="middle" fill="#fb7185" font-family="system-ui" font-size="14" font-weight="bold">🛡️ Compliance & Security</text>
  <text x="780" y="600" fill="#94a3b8" font-family="system-ui" font-size="10">✓ DPDP 2025 Consent Management</text>
  <text x="780" y="618" fill="#94a3b8" font-family="system-ui" font-size="10">✓ Audit Logging · Breach Detection · Encryption at Rest</text>
  <text x="780" y="636" fill="#94a3b8" font-family="system-ui" font-size="10">✓ ABDM/ABHA Integration · Aadhaar eKYC</text>

  <!-- Integrations Bar -->
  <rect x="50" y="675" width="1100" height="45" rx="8" fill="rgba(30,41,59,0.5)" stroke="#64748b" stroke-width="1"/>
  <text x="80" y="700" fill="#64748b" font-family="system-ui" font-size="11" font-weight="bold">Integrations:</text>
  <text x="200" y="700" fill="#94a3b8" font-family="system-ui" font-size="11">Meta WhatsApp API</text>
  <text x="370" y="700" fill="#94a3b8" font-family="system-ui" font-size="11">Twilio (non-PHI only)</text>
  <text x="550" y="700" fill="#94a3b8" font-family="system-ui" font-size="11">ABDM / Ayushman Bharat</text>
  <text x="750" y="700" fill="#94a3b8" font-family="system-ui" font-size="11">Aadhaar eKYC</text>
  <text x="910" y="700" fill="#94a3b8" font-family="system-ui" font-size="11">OpenAI-compatible AI</text>

  <!-- Footer -->
  <rect x="0" y="865" width="1200" height="35" fill="#020617" opacity="0.8"/>
  <text x="600" y="886" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="11">HealthBridge Platform — Made in India · FHIR R4 · DPDP 2025 · ABDM Integrated</text>
</svg>
